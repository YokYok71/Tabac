<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Reset...</title>
<style>body{background:#0a0a0a;color:#d4d4d4;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:16px;}</style>
</head>
<body>
<div id="msg">Nettoyage en cours...</div>
<script>
async function reset() {
  var msg = document.getElementById('msg');
  try {
    var regs = await navigator.serviceWorker.getRegistrations();
    for (var r of regs) { await r.unregister(); }
    var keys = await caches.keys();
    for (var k of keys) { await caches.delete(k); }
    msg.textContent = '✅ Cache nettoyé ! Redirection...';
  } catch(e) {
    msg.textContent = '✅ Redirection...';
  }
  setTimeout(function(){ window.location.href = './?_v=' + Date.now(); }, 1500);
}
reset();
</script>
</body>
</html>
